version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DEMO_MODE=true
      - DASHBOARD_PASSWORD=demo123
      - JWT_SECRET=demo-jwt-secret-change-in-production
      - GOOGLE_SHEETS_SPREADSHEET_ID=dummy
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=dummy@example.com
      - GOOGLE_PRIVATE_KEY=-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQE\n-----END PRIVATE KEY-----
      - ANTHROPIC_API_KEY=dummy
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
